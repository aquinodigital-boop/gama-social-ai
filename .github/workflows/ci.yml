name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Lint is allowed to fail during the legacy cleanup phase.
      # TODO: remove `continue-on-error` once the pre-existing lint errors
      # in AppContext.jsx, button.jsx, templates and vite.config.js are fixed.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
